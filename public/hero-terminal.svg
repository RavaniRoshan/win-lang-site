  <text x="164" y="422" fill="#C9D8CC" font-family="'SFMono-Regular', Consolas, monospace" font-size="31">click button "Sign in"</text>
  <text x="164" y="474" fill="#C9D8CC" font-family="'SFMono-Regular', Consolas, monospace" font-size="31">set auth_state to "awaiting_credentials"</text>
  <text x="164" y="526" fill="#C9D8CC" font-family="'SFMono-Regular', Consolas, monospace" font-size="31">return auth_state</text>
