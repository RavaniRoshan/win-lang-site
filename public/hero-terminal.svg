  <text x="128" y="262" fill="#E8F0E8" font-family="'SFMono-Regular', Consolas, monospace" font-size="36">tell application "Chrome"</text>
  <text x="164" y="318" fill="#C9D8CC" font-family="'SFMono-Regular', Consolas, monospace" font-size="31">open "https://github.com/openai"</text>
