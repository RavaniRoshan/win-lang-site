  <rect x="126" y="648" width="320" height="72" rx="22" fill="#FFFFFF" fill-opacity="0.08"/>
  <text x="156" y="694" fill="#DDE8DE" font-family="Inter, Arial, sans-serif" font-size="28">status  awaiting_credentials</text>
  <defs>
